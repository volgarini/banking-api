spring:
  application:
    name: banking-api
  datasource:
    url: jdbc:postgresql://localhost:5432/banking
    username: banking
    password: banking
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    web:
      pageable:
        max-page-size: 100
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

  api-docs:
    path: /api-docs
